<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch The Hearts</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#ff8fab;
  font-family:Arial;
  text-align:center;
}

#score{
  position:absolute;
  top:15px;
  left:15px;
  color:white;
  font-size:24px;
}

.heart{
  position:absolute;
  font-size:38px;
  cursor:pointer;
}

#msg{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:20px;
  font-size:22px;
  display:none;
}

#result{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:40px;
  display:none;
}

/* نجوم */
.star{
  position:absolute;
  font-size:20px;
  animation:starBurst 0.6s forwards;
}

@keyframes starBurst{
  0%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:translateY(-40px) scale(0.5);}
}

/* قلوب انفجار */
.burst{
  position:absolute;
  font-size:24px;
  animation:burst 0.8s forwards;
}

@keyframes burst{
  0%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:translateY(-60px) scale(1.5);}
}
</style>
</head>

<body>
<div id="score">Score 0</div>
<div id="msg"></div>
<div id="result"></div>

<audio id="music" src="music.mp3" loop autoplay></audio>
<audio id="pop" src="pop.mp3"></audio>

<script>
// === الرسائل ===
let messages=[
"صباح الخير يقمري",
"احلي حد يصحي",
"بحبك اوي",
"حقك عليا يحببتي",
"يجامده😂",
"متزعليش يروحي",
"انتي الحته بتاعتي",
"لو مضحكتيش هركبك😂",
"ضحكتك حلوه اوي",
"بخ 😂",
"غلطت بس بحبك",
"يا أجمد بت",
"بحب عيونك",
"بحب شفايفك",
"بحب طيازك😂😂",
"بحب صدرك🙈😂",
"بعشق كسكوسك بقا🙈😂",
"بحب كلامك",
"نفسي اسمع صوتك",
"موووااااه",
"انتي قلبي",
"مقدرش أزعلك",
"وحشتيني",
"مش هكررها",
"متجيبي بوسه",
"مراتي اهي اهي اهي",
"سامحيني بقا"
] ;

let score=0;

// === تأثير النجوم والانفجار ===
function effects(x,y){
  for(let i=0;i<6;i++){
    let heart=document.createElement("div");
    heart.className="burst";
    heart.innerHTML="❤️";
    heart.style.left=x+"px";
    heart.style.top=y+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),800);
  }
  for(let i=0;i<5;i++){
    let star=document.createElement("div");
    star.className="star";
    star.innerHTML="✨";
    star.style.left=x+"px";
    star.style.top=y+"px";
    document.body.appendChild(star);
    setTimeout(()=>star.remove(),600);
  }
}

// === كتابة الرسالة تدريجياً ===
function showMessage(text){
  let box=document.getElementById("msg");
  box.style.display="block";
  box.innerHTML="";
  let i=0;
  let type=setInterval(()=>{
    box.innerHTML+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(type);
      setTimeout(()=>{
        box.style.display="none";
      }, text.length>8?3000:1000);
    }
  },50);
}

// === إنشاء قلب ===
function createHeart(){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*window.innerWidth+"px";
  heart.style.top="-40px";
  document.body.appendChild(heart);

  let fall=setInterval(()=>{
    let speed=4 + score*0.3; // زيادة السرعة تدريجياً
    heart.style.top = heart.offsetTop + speed + "px";

    if(heart.offsetTop > window.innerHeight){
      heart.remove();
      clearInterval(fall);
    }
  },20);

  heart.onclick=(e)=>{
    document.getElementById("pop").play();
    effects(e.clientX,e.clientY);
    score++;
    document.getElementById("score").innerHTML="Score "+score+" / "+messages.length;
    heart.remove();
    clearInterval(fall);
    showMessage(messages[score-1]);

    // تحقق من الفوز
    if(score>=messages.length){
      document.getElementById("result").style.display="block";
      document.getElementById("result").innerHTML="عاااش يميرا😂❤️";
      clearInterval(spawn);
    }
  }
}

// === توليد القلوب ===
let spawn=setInterval(()=>{
  if(score>=messages.length) return;
  createHeart();
},1200);

</script>
</body>
</html>
