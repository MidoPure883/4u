<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>❤️ 3D Hearts - Catch The Love ❤️</title>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #ff9a9e 0%, #fecfef 100%);
      font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
      overflow-x: hidden;
      position: relative;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><polygon points="2,2 22,13 12,16 2,25" fill="%23ff4d6d" stroke="%23fff" stroke-width="1.5"/><circle cx="12" cy="13" r="3" fill="white"/></svg>') 12 5, auto;
    }

    /* شاشة البداية */
    .start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 10%, #ffb7c5, #ff6f91);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.6s;
      backdrop-filter: blur(2px);
    }

    .start-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    /* قلوب الخلفية 3D */
    .floating-heart {
      position: absolute;
      font-size: 28px;
      pointer-events: none;
      animation: floatUp3D 7s linear forwards;
      z-index: 1;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
      transform-style: preserve-3d;
      transform: rotateY(15deg) rotateX(8deg);
    }

    @keyframes floatUp3D {
      0% { transform: translateY(100vh) rotateY(0deg) rotateX(0deg); opacity: 0.9; }
      100% { transform: translateY(-15vh) rotateY(25deg) rotateX(12deg); opacity: 0; }
    }

    /* زر الدخول */
    #enter {
      font-size: 2.2rem;
      padding: 18px 70px;
      border: none;
      border-radius: 70px;
      background: linear-gradient(135deg, #ff1e4d, #ff4d6d);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 15px 25px rgba(0,0,0,0.3), 0 0 15px #ff4d6d, 0 0 30px #ff4d6d;
      transition: 0.2s ease;
      z-index: 20;
      transform: perspective(800px) rotateX(0deg);
    }

    #enter:hover {
      transform: perspective(800px) rotateX(6deg) scale(1.05);
      box-shadow: 0 25px 35px rgba(0,0,0,0.4), 0 0 25px #ffb347, 0 0 50px #ff4d6d;
    }

    /* حاوية اللعبة */
    .game-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      background: radial-gradient(circle at 20% 40%, #ffb3ba, #ff8c94);
    }

    .game-container.active {
      display: block;
      opacity: 1;
    }

    /* لوحة النقاط */
    #score {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff3e0;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 3px 3px 0 #c2185b;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 20px;
      border-radius: 50px;
      backdrop-filter: blur(8px);
      z-index: 100;
      font-family: monospace;
      border: 1px solid rgba(255,255,200,0.5);
    }

    /* القلوب ثلاثية الأبعاد */
    .heart {
      position: absolute;
      font-size: 52px;
      cursor: pointer;
      filter: drop-shadow(8px 10px 12px rgba(0,0,0,0.4));
      transform-style: preserve-3d;
      transform: rotateY(18deg) rotateX(12deg) scale(1);
      transition: transform 0.1s ease;
      z-index: 90;
      animation: heartGlow 1.2s infinite alternate;
    }

    .heart:hover {
      transform: rotateY(22deg) rotateX(14deg) scale(1.08);
    }

    @keyframes heartGlow {
      0% { text-shadow: 0 0 0px #ffb7c5; }
      100% { text-shadow: 0 0 8px #fff0b5, 0 0 12px #ff6a88; }
    }

    /* فقاعة الكلام (الرسالة) */
    .speech-bubble {
      position: absolute;
      background: #fffef7;
      color: #b13e5c;
      padding: 10px 20px;
      border-radius: 45px;
      font-size: 1.2rem;
      font-weight: bold;
      max-width: 260px;
      text-align: center;
      direction: rtl;
      font-family: 'Segoe UI', 'Arial', cursive;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid #ffb3ba;
      animation: bubblePop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 20px;
      border-width: 10px 10px 0 10px;
      border-style: solid;
      border-color: #fffef7 transparent transparent transparent;
    }

    @keyframes bubblePop {
      0% { opacity: 0; transform: translateY(10px) scale(0.6); }
      20% { opacity: 1; transform: translateY(-5px) scale(1.02); }
      100% { opacity: 1; transform: translateY(-20px) scale(1); }
    }

    /* تأثيرات الانفجار */
    .burst {
      position: absolute;
      font-size: 28px;
      pointer-events: none;
      animation: burstAnim 0.7s forwards;
      z-index: 150;
    }

    @keyframes burstAnim {
      0% { opacity: 1; transform: scale(0.4) translateY(0); }
      100% { opacity: 0; transform: scale(1.5) translateY(-55px); }
    }

    .star {
      position: absolute;
      font-size: 24px;
      pointer-events: none;
      animation: starAnim 0.65s forwards;
      z-index: 140;
    }

    @keyframes starAnim {
      0% { opacity: 0.9; transform: rotate(0deg) scale(0.5); }
      100% { opacity: 0; transform: translateY(-50px) rotate(240deg) scale(0.2); }
    }

    /* شاشة النصر */
    #result {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(145deg, #ffdd99, #ffb347);
      color: #4a1f00;
      font-size: 2rem;
      font-weight: bold;
      padding: 28px 45px;
      border-radius: 80px;
      text-align: center;
      z-index: 300;
      display: none;
      box-shadow: 0 25px 40px rgba(0,0,0,0.5);
      border: 2px solid #ffec80;
      white-space: nowrap;
    }

    /* زر إعادة اللعب */
    #restartBtn {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(95deg, #ff3b5c, #e01e3c);
      border: none;
      padding: 12px 32px;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      z-index: 250;
      display: none;
      box-shadow: 0 12px 18px rgba(0,0,0,0.4);
      transition: 0.15s;
    }

    #restartBtn:hover {
      transform: translateX(-50%) scale(1.04);
    }

    @media (max-width: 600px) {
      .heart { font-size: 44px; }
      .speech-bubble { font-size: 1rem; padding: 8px 16px; white-space: normal; max-width: 200px; }
      #result { font-size: 1.3rem; padding: 18px 24px; white-space: normal; width: 85%; }
      #score { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <button id="enter">💖 دخول 💖</button>
</div>

<div class="game-container" id="gameContainer">
  <div id="score">❤️ 0 / 27</div>
  <div id="result"></div>
  <button id="restartBtn">🔄 قلب جديد 🔄</button>
</div>

<audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>
<audio id="popSound" src="pop.mp3" preload="auto"></audio>

<script>
  // قائمة الرسائل الرومانسية
  const messagesList = [
    "💕 صباح الخير يقمري", 
"😘 أحلى حد يصحي", 
"❤️ بحبك اوي",
 "🌸 حقك عليا ياحببتي",
    "😂 ياجامدة",
 "🥺 متزعليش يروحي",
 "🫶 إنتي الحتة بتاعتي",
 "😂 لو مضحكتيش هركبك",
    "😍 ضحكتك حلوه أوي", 
"😘 بخ",
 "غلطت بس بحبك",
 "يا أجمد بت",
    "❤️ بحب عيونك", 
"💋 بحب شفايفك",
 "😂بحب طيازك", 
"🙈😂 بحب صدرك",
    "🙈😂 بعشق كسكوسك بقا",
 "بحب كلامك", 
" نفسي أسمع صوتك", 
"💋 موووااااه",
    " إنتي قلبي",
 "مقدرش أزعلك", 
"🥺 وحشتيني", 
"مش هكررها",
    "متجيبي بوسه", 
"مراتي اهي اهي اهي",
 "🥹 سامحيني بقا"
  ];

  let currentScore = 0;
  let spawnInterval = null;
  let gameActive = true;
  const totalMessages = messagesList.length;

  const gameContainer = document.getElementById('gameContainer');
  const startScreenDiv = document.getElementById('startScreen');
  const scoreDiv = document.getElementById('score');
  const resultDiv = document.getElementById('result');
  const restartBtn = document.getElementById('restartBtn');
  const bgMusic = document.getElementById('bgMusic');
  const popAudio = document.getElementById('popSound');

  // تأثير الانفجار
  function createBurstEffects(x, y) {
    for (let i = 0; i < 9; i++) {
      let burstHeart = document.createElement('div');
      burstHeart.className = 'burst';
      burstHeart.innerHTML = ['❤️', '💖', '💗', '💓'][Math.floor(Math.random() * 4)];
      burstHeart.style.left = (x + (Math.random() - 0.5) * 45) + 'px';
      burstHeart.style.top = (y + (Math.random() - 0.5) * 35) + 'px';
      document.body.appendChild(burstHeart);
      setTimeout(() => burstHeart.remove(), 700);
    }
    for (let i = 0; i < 7; i++) {
      let star = document.createElement('div');
      star.className = 'star';
      star.innerHTML = '✨';
      star.style.left = (x + (Math.random() - 0.5) * 50) + 'px';
      star.style.top = (y + (Math.random() - 0.5) * 30) + 'px';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 650);
    }
  }

  // عرض فقاعة الرسالة مع ضبط الموقع ليبقى داخل الشاشة
  function showBubbleMessage(text, clickX, clickY) {
    const bubble = document.createElement('div');
    bubble.className = 'speech-bubble';
    bubble.innerText = text;
    document.body.appendChild(bubble);

    // الحصول على أبعاد الفقاعة بعد إضافتها
    const bubbleRect = bubble.getBoundingClientRect();
    let leftPos = clickX - bubbleRect.width / 2;
    let topPos = clickY - bubbleRect.height - 15; // فوق القلب

    // التأكد من أن الفقاعة لا تخرج عن الحواف الأفقية
    if (leftPos < 5) leftPos = 5;
    if (leftPos + bubbleRect.width > window.innerWidth - 5) {
      leftPos = window.innerWidth - bubbleRect.width - 5;
    }
    // إذا كانت الفقاعة ستخرج من الأعلى، نضعها أسفل القلب
    if (topPos < 10) {
      topPos = clickY + 40;
    }
    // التأكد من عدم الخروج من الأسفل
    if (topPos + bubbleRect.height > window.innerHeight - 10) {
      topPos = window.innerHeight - bubbleRect.height - 10;
    }

    bubble.style.left = leftPos + 'px';
    bubble.style.top = topPos + 'px';

    // إزالة الفقاعة بعد 1.8 ثانية
    setTimeout(() => {
      if (bubble && bubble.remove) bubble.remove();
    }, 1800);
  }

  // إنشاء قلب ثلاثي الأبعاد يسقط
  function create3DHeart() {
    if (!gameActive) return;

    const heartDiv = document.createElement('div');
    heartDiv.className = 'heart';
    const heartVariants = ['❤️', '💖', '💗', '💘', '💝'];
    heartDiv.innerHTML = heartVariants[Math.floor(Math.random() * heartVariants.length)];
    
    const startX = Math.random() * (window.innerWidth - 80);
    heartDiv.style.left = startX + 'px';
    heartDiv.style.top = '-60px';
    document.body.appendChild(heartDiv);

    let posY = -60;
    let speed = 4.2 + Math.min(currentScore * 0.2, 3.6);
    let animationId;

    function fall() {
      if (!gameActive || !heartDiv.isConnected) {
        cancelAnimationFrame(animationId);
        return;
      }
      posY += speed;
      heartDiv.style.top = posY + 'px';
      
      if (posY > window.innerHeight + 100) {
        if (heartDiv.isConnected) heartDiv.remove();
        cancelAnimationFrame(animationId);
        return;
      }
      animationId = requestAnimationFrame(fall);
    }
    
    animationId = requestAnimationFrame(fall);
    
    heartDiv.onclick = (e) => {
      e.stopPropagation();
      if (!gameActive) return;
      
      const rect = heartDiv.getBoundingClientRect();
      const clickCenterX = rect.left + rect.width / 2;
      const clickCenterY = rect.top + rect.height / 2;
      
      // تشغيل صوت الفقاعة
      if (popAudio) {
        popAudio.currentTime = 0;
        popAudio.play().catch(err => console.log("audio error", err));
      }
      
      createBurstEffects(clickCenterX, clickCenterY);
      
      if (currentScore < totalMessages) {
        currentScore++;
        scoreDiv.innerHTML = `❤️ ${currentScore} / ${totalMessages}`;
        
        const messageIndex = currentScore - 1;
        const selectedMessage = messagesList[messageIndex];
        // عرض الرسالة في فقاعة تظهر بوضوح
        showBubbleMessage(selectedMessage, clickCenterX, clickCenterY);
        
        if (currentScore >= totalMessages) {
          gameWin();
        }
      }
      
      if (heartDiv.isConnected) heartDiv.remove();
      cancelAnimationFrame(animationId);
    };
    
    heartDiv._cleanup = () => {
      cancelAnimationFrame(animationId);
      if (heartDiv.isConnected) heartDiv.remove();
    };
  }

  function gameWin() {
    if (!gameActive) return;
    gameActive = false;
    
    if (spawnInterval) {
      clearInterval(spawnInterval);
      spawnInterval = null;
    }
    
    document.querySelectorAll('.heart').forEach(heart => {
      if (heart._cleanup) heart._cleanup();
      else heart.remove();
    });
    
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '🎉✨ عاااش يميرا! ✨🎉<br>💖 كسبتي كل القلوب 💖';
    restartBtn.style.display = 'block';
  }

  function fullReset() {
    if (spawnInterval) {
      clearInterval(spawnInterval);
      spawnInterval = null;
    }
    
    document.querySelectorAll('.heart').forEach(heart => {
      if (heart._cleanup) heart._cleanup();
      else heart.remove();
    });
    document.querySelectorAll('.speech-bubble').forEach(b => b.remove());
    
    currentScore = 0;
    gameActive = true;
    scoreDiv.innerHTML = `❤️ 0 / ${totalMessages}`;
    resultDiv.style.display = 'none';
    restartBtn.style.display = 'none';
    
    spawnInterval = setInterval(() => {
      if (gameActive && currentScore < totalMessages) {
        create3DHeart();
      } else if (currentScore >= totalMessages && gameActive) {
        gameWin();
      }
    }, 1020);
  }

  function startGameSession() {
    if (spawnInterval) clearInterval(spawnInterval);
    document.querySelectorAll('.heart').forEach(h => h.remove());
    document.querySelectorAll('.speech-bubble').forEach(b => b.remove());
    currentScore = 0;
    gameActive = true;
    scoreDiv.innerHTML = `❤️ 0 / ${totalMessages}`;
    resultDiv.style.display = 'none';
    restartBtn.style.display = 'none';
    
    spawnInterval = setInterval(() => {
      if (gameActive && currentScore < totalMessages) {
        create3DHeart();
      } else if (currentScore >= totalMessages && gameActive) {
        gameWin();
      }
    }, 1020);
  }

  function transitionToGame() {
    bgMusic.play().catch(e => console.log("music", e));
    startScreenDiv.classList.add('hide');
    gameContainer.classList.add('active');
    setTimeout(() => startGameSession(), 200);
  }

  function handleRestart() {
    if (!gameActive || currentScore >= totalMessages) {
      fullReset();
    } else {
      if (confirm("✨ هل تريد بدء مغامرة جديدة من القلب؟ ✨")) {
        fullReset();
      }
    }
  }

  function spawnBackground3DHearts() {
    setInterval(() => {
      if (startScreenDiv && !startScreenDiv.classList.contains('hide')) {
        const bgHeart = document.createElement('div');
        bgHeart.className = 'floating-heart';
        bgHeart.innerHTML = Math.random() > 0.6 ? '❤️' : '💖';
        bgHeart.style.left = Math.random() * 100 + '%';
        bgHeart.style.fontSize = (22 + Math.random() * 28) + 'px';
        bgHeart.style.animationDuration = 5 + Math.random() * 6 + 's';
        startScreenDiv.appendChild(bgHeart);
        setTimeout(() => bgHeart.remove(), 8000);
      }
    }, 400);
  }

  function bindEvents() {
    document.getElementById('enter').addEventListener('click', transitionToGame);
    restartBtn.addEventListener('click', handleRestart);
  }

  function init() {
    bindEvents();
    spawnBackground3DHearts();
    if (bgMusic) bgMusic.volume = 0.45;
    if (popAudio) popAudio.volume = 0.7;
    gameContainer.classList.remove('active');
    startScreenDiv.classList.remove('hide');
  }
  
  init();
</script>
</body>
</html>
