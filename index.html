<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>❤️ 3D Hearts | Catch & Love ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #ff9a9e, #fecfef, #ff6f91);
      overflow-x: hidden;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="28" viewBox="0 0 24 28"><polygon points="2,2 22,13 12,16 2,25" fill="%23ff3366" stroke="%23fff" stroke-width="1.5"/><circle cx="12" cy="13" r="3" fill="white"/></svg>') 12 5, auto;
    }

    /* شاشة البداية */
    .start-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #ffb7c5, #ff5e7e);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.5s ease, visibility 0.5s;
      backdrop-filter: blur(3px);
    }
    .start-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    /* زر الدخول ثلاثي الأبعاد */
    #enter {
      font-size: 2rem;
      padding: 18px 65px;
      border: none;
      border-radius: 70px;
      background: linear-gradient(145deg, #ff1e4d, #ff4d6d);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 20px 30px rgba(0,0,0,0.4), 0 0 20px #ffb347;
      transition: 0.2s;
      transform: perspective(600px) rotateX(0deg);
    }
    #enter:hover {
      transform: perspective(600px) rotateX(6deg) scale(1.03);
      box-shadow: 0 25px 40px rgba(0,0,0,0.5);
    }

    /* حاوية اللعبة */
    .game-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .game-container.active {
      display: block;
      opacity: 1;
    }

    /* لوحة النقاط */
    #score {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 50px;
      color: #fff5e6;
      font-size: 26px;
      font-weight: bold;
      font-family: monospace;
      z-index: 100;
      border: 1px solid rgba(255,255,200,0.6);
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    /* القلب المتجه SVG ثلاثي الأبعاد */
    .heart-3d {
      position: absolute;
      width: 55px;
      height: 55px;
      cursor: pointer;
      filter: drop-shadow(8px 12px 15px rgba(0,0,0,0.4));
      transform-style: preserve-3d;
      transform: rotateY(18deg) rotateX(10deg) scale(1);
      transition: transform 0.08s linear;
      z-index: 90;
      will-change: transform;
    }
    .heart-3d:hover {
      transform: rotateY(24deg) rotateX(14deg) scale(1.07);
      filter: drop-shadow(12px 16px 20px rgba(0,0,0,0.5));
    }
    /* مسار القلب (SVG) */
    .heart-svg {
      width: 100%;
      height: 100%;
      display: block;
      transition: all 0.1s;
    }

    /* فقاعة الرسالة الاحترافية */
    .bubble {
      position: absolute;
      background: rgba(255, 250, 240, 0.98);
      backdrop-filter: blur(4px);
      color: #c41e3a;
      padding: 12px 24px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      white-space: nowrap;
      direction: rtl;
      box-shadow: 0 15px 25px rgba(0,0,0,0.3), inset 0 1px 2px white;
      border: 1px solid #ffb7c5;
      z-index: 200;
      pointer-events: none;
      font-family: 'Segoe UI', 'Cairo', sans-serif;
      animation: bubbleFloat 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 20px;
      border-width: 12px 12px 0 12px;
      border-style: solid;
      border-color: rgba(255,250,240,0.98) transparent transparent;
    }
    @keyframes bubbleFloat {
      0% { opacity: 0; transform: translateY(15px) scale(0.7); }
      100% { opacity: 1; transform: translateY(-10px) scale(1); }
    }

    /* تأثيرات انفجار (خفيفة للحفاظ على الأداء) */
    .particle {
      position: absolute;
      pointer-events: none;
      animation: popParticle 0.6s forwards;
      font-size: 20px;
      z-index: 150;
    }
    @keyframes popParticle {
      0% { opacity: 0.9; transform: scale(0.3) translateY(0); }
      100% { opacity: 0; transform: scale(1.2) translateY(-50px); }
    }

    /* شاشة النصر */
    #win-overlay {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #ffdd99, #ffaa33);
      padding: 25px 45px;
      border-radius: 80px;
      color: #3b1e00;
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      z-index: 300;
      display: none;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      border: 3px solid #fff0b5;
      white-space: nowrap;
    }
    #restartBtn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff3b5c;
      border: none;
      padding: 12px 32px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      z-index: 250;
      display: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      transition: 0.1s;
    }
    #restartBtn:hover { transform: translateX(-50%) scale(1.03); background: #e01e3c; }

    @media (max-width: 650px) {
      .heart-3d { width: 48px; height: 48px; }
      .bubble { font-size: 0.95rem; padding: 8px 18px; white-space: normal; max-width: 200px; }
      #win-overlay { font-size: 1.2rem; padding: 15px 25px; white-space: normal; width: 80%; }
    }
  </style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <button id="enter">💘 ادخل لعالم الحب 💘</button>
</div>

<div class="game-container" id="gameContainer">
  <div id="score">❤️ 0 / 27</div>
  <div id="win-overlay"></div>
  <button id="restartBtn">🔄 إعادة القلوب 🔄</button>
</div>

<audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>
<audio id="popSound" src="pop.mp3" preload="auto"></audio>

<script>
  (function(){
    // ---------- قائمة الرسائل الرومانسية ----------
    const messages = [
      "💕 صباح الخير يقمري", 
"😘 أحلى حد يصحي", 
"❤️ بحبك اوي", 
"🌸 حقك عليا ياحببتي",
      "😂 ياجامدة", 
"🥺 متزعليش يروحي", 
"🫶 إنتي الحتة بتاعتي",
 "😂 لو مضحكتيش هركبك",
      " ضحكتك حلوه أوي", 
"😘 بخ", 
"غلطت بس بحبك", 
" يا أجمد بت",
      "❤️ بحب عيونك",
 "💋 بحب شفايفك",
 "😂🍑 بحب طيازك", 
"🙈😂 بحب صدرك",
      "🙈😂 بعشق كسكوسك بقا",
 "بحب كلامك", 
" نفسي أسمع صوتك",
 "💋 موووااااه",
      "إنتي قلبي",
 " مقدرش أزعلك",
 "🥺 وحشتيني", 
" مش هكررها",
      "متجيبي بوسه يبت", 
" مراتي اهي اهي اهي",
 "🥹 سامحيني بقا"
    ];
    const TOTAL = messages.length;

    // متغيرات الحالة
    let currentScore = 0;
    let gameActive = true;
    let spawnTimer = null;
    let activeHearts = new Set();   // لتخزين معرفات الـ requestAnimationFrame
    let frameRequest = null;

    // عناصر DOM
    const startScreen = document.getElementById('startScreen');
    const gameContainer = document.getElementById('gameContainer');
    const scoreDiv = document.getElementById('score');
    const winOverlay = document.getElementById('win-overlay');
    const restartBtn = document.getElementById('restartBtn');
    const bgMusic = document.getElementById('bgMusic');
    const popAudio = document.getElementById('popSound');

    // ------ مسار SVG لقلب احترافي 3D ------
    const heartSVG = `<svg class="heart-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="heartGrad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#ff758f"/>
          <stop offset="100%" stop-color="#e6005c"/>
        </radialGradient>
        <filter id="glow3d" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
          <feMerge>
            <feMergeNode in="offsetblur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <path d="M50,30 C50,15 30,5 18,18 C5,31 10,50 30,65 L50,80 L70,65 C90,50 95,31 82,18 C70,5 50,15 50,30 Z" 
            fill="url(#heartGrad)" stroke="#ffb3c6" stroke-width="2" filter="url(#glow3d)"/>
    </svg>`;

    // ----- إنشاء قلب SVG بخصائص 3D -----
    function createHeartElement() {
      const heartDiv = document.createElement('div');
      heartDiv.className = 'heart-3d';
      heartDiv.innerHTML = heartSVG;
      // وضع عشوائي في البداية
      const startX = Math.random() * (window.innerWidth - 70);
      heartDiv.style.left = startX + 'px';
      heartDiv.style.top = '-70px';
      return heartDiv;
    }

    // ----- عرض فقاعة الرسالة (داخل الشاشة) -----
    function showBubbleMessage(text, clickX, clickY) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerText = text;
      document.body.appendChild(bubble);
      
      const rect = bubble.getBoundingClientRect();
      let left = clickX - rect.width/2;
      let top = clickY - rect.height - 20;
      // منع الخروج عن الحواف
      left = Math.min(Math.max(left, 8), window.innerWidth - rect.width - 8);
      if (top < 10) top = clickY + 35;
      if (top + rect.height > window.innerHeight - 10) top = window.innerHeight - rect.height - 10;
      
      bubble.style.left = left + 'px';
      bubble.style.top = top + 'px';
      
      setTimeout(() => bubble.remove(), 1800);
    }

    // ----- تأثيرات بسيطة (خفيفة) -----
    function createPopEffects(x, y) {
      for (let i = 0; i < 6; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerHTML = ['❤️','💖','✨','💕'][Math.floor(Math.random()*4)];
        p.style.left = (x + (Math.random() - 0.5)*35) + 'px';
        p.style.top = (y + (Math.random() - 0.5)*30) + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
      }
    }

    // ----- حركة القلب باستخدام requestAnimationFrame (أداء عالي) -----
    function animateHeart(heartDiv, speed) {
      let posY = -70;
      let frameId;
      
      function step() {
        if (!gameActive || !heartDiv.isConnected) {
          cancelAnimationFrame(frameId);
          activeHearts.delete(frameId);
          return;
        }
        posY += speed;
        // استخدام transform بدلاً من top لتحسين الأداء
        heartDiv.style.transform = `translateY(${posY}px) rotateY(18deg) rotateX(10deg)`;
        if (posY > window.innerHeight + 100) {
          if (heartDiv.isConnected) heartDiv.remove();
          cancelAnimationFrame(frameId);
          activeHearts.delete(frameId);
          return;
        }
        frameId = requestAnimationFrame(step);
        activeHearts.add(frameId);
      }
      
      frameId = requestAnimationFrame(step);
      return frameId;
    }

    // ----- إسقاط قلب جديد -----
    function spawnHeart() {
      if (!gameActive || currentScore >= TOTAL) return;
      
      const heart = createHeartElement();
      document.body.appendChild(heart);
      // سرعة تزداد قليلاً مع النقاط (صعوبة تدريجية)
      let speed = 3.8 + Math.min(currentScore * 0.18, 3.2);
      const animId = animateHeart(heart, speed);
      
      // ربط حدث النقر (كليك واحد)
      heart.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!gameActive) return;
        
        // تشغيل صوت الفقاعة
        if (popAudio) {
          popAudio.currentTime = 0;
          popAudio.play().catch(()=>{});
        }
        
        // الحصول على الموقع الفعلي للقلب (بعد الترجمة)
        const rect = heart.getBoundingClientRect();
        const centerX = rect.left + rect.width/2;
        const centerY = rect.top + rect.height/2;
        
        createPopEffects(centerX, centerY);
        
        // زيادة النتيجة وعرض الرسالة
        if (currentScore < TOTAL) {
          currentScore++;
          scoreDiv.innerText = `❤️ ${currentScore} / ${TOTAL}`;
          const msg = messages[currentScore - 1];
          showBubbleMessage(msg, centerX, centerY);
          
          if (currentScore >= TOTAL) {
            gameWin();
          }
        }
        
        // إزالة القلب بشكل نظيف
        if (heart.isConnected) heart.remove();
        cancelAnimationFrame(animId);
        activeHearts.delete(animId);
      });
      
      // تنظيف إذا انتهت اللعبة قبل النقر
      heart._cancelAnim = () => {
        cancelAnimationFrame(animId);
        activeHearts.delete(animId);
        if (heart.isConnected) heart.remove();
      };
    }

    // ----- نهاية اللعبة (فوز) -----
    function gameWin() {
      if (!gameActive) return;
      gameActive = false;
      if (spawnTimer) clearInterval(spawnTimer);
      
      // إزالة كل القلوب
      document.querySelectorAll('.heart-3d').forEach(h => {
        if (h._cancelAnim) h._cancelAnim();
        else h.remove();
      });
      
      winOverlay.style.display = 'block';
      winOverlay.innerHTML = '🎉✨ عاااش يميرا! ✨🎉<br>💖 كسبتي كل القلوب 💖';
      restartBtn.style.display = 'block';
    }

    // ----- إعادة تعيين كاملة -----
    function fullReset() {
      if (spawnTimer) clearInterval(spawnTimer);
      // إلغاء كل الرسوم المتحركة
      for (let id of activeHearts) {
        cancelAnimationFrame(id);
      }
      activeHearts.clear();
      document.querySelectorAll('.heart-3d').forEach(h => {
        if (h._cancelAnim) h._cancelAnim();
        else h.remove();
      });
      document.querySelectorAll('.bubble').forEach(b => b.remove());
      document.querySelectorAll('.particle').forEach(p => p.remove());
      
      currentScore = 0;
      gameActive = true;
      scoreDiv.innerText = `❤️ 0 / ${TOTAL}`;
      winOverlay.style.display = 'none';
      restartBtn.style.display = 'none';
      
      // بدء التوليد من جديد
      spawnTimer = setInterval(() => {
        if (gameActive && currentScore < TOTAL) {
          spawnHeart();
        } else if (currentScore >= TOTAL && gameActive) {
          gameWin();
        }
      }, 1000);
    }

    // ----- بدء جلسة اللعبة لأول مرة -----
    function startGameSession() {
      fullReset(); // يستخدم fullReset الذي يعيد كل شيء وينظف
    }

    // ----- الانتقال من شاشة البداية -----
    function transitionToGame() {
      bgMusic.play().catch(e=>console.log);
      startScreen.classList.add('hide');
      gameContainer.classList.add('active');
      startGameSession();
    }

    // ----- إعادة اللعب بالضغط على الزر -----
    function handleRestart() {
      fullReset();
    }

    // ----- قلوب خلفية لشاشة البداية (زينة خفيفة) -----
    function startBgHearts() {
      setInterval(() => {
        if (!startScreen.classList.contains('hide')) {
          const heartBg = document.createElement('div');
          heartBg.className = 'floating-heart';
          heartBg.innerHTML = '❤️';
          heartBg.style.left = Math.random() * 100 + '%';
          heartBg.style.fontSize = (20 + Math.random() * 30) + 'px';
          heartBg.style.position = 'absolute';
          heartBg.style.bottom = '-50px';
          heartBg.style.animation = 'floatUp3D 7s linear forwards';
          heartBg.style.pointerEvents = 'none';
          startScreen.appendChild(heartBg);
          setTimeout(() => heartBg.remove(), 7000);
        }
      }, 500);
    }

    // إضافة keyframes ديناميكياً (لقلوب الخلفية)
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
      @keyframes floatUp3D {
        0% { transform: translateY(0) rotateY(0deg); opacity: 1; }
        100% { transform: translateY(-110vh) rotateY(30deg); opacity: 0; }
      }
      .floating-heart {
        position: absolute;
        pointer-events: none;
        z-index: 1;
      }
    `;
    document.head.appendChild(styleSheet);

    // ربط الأحداث
    document.getElementById('enter').addEventListener('click', transitionToGame);
    restartBtn.addEventListener('click', handleRestart);
    
    // تحسين الصوتيات
    if (popAudio) popAudio.volume = 0.7;
    if (bgMusic) bgMusic.volume = 0.4;
    
    startBgHearts();
    // التأكد من عدم بدء اللعبة قبل الضغط
    gameContainer.classList.remove('active');
    startScreen.classList.remove('hide');
  })();
</script>
</body>
</html>
